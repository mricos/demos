<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muse EEG</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #eee; font-family: monospace; padding: 16px; }
#status { padding: 8px 0; font-size: 14px; color: #888; }
#status.connected { color: #4f4; }
#info { padding: 4px 0 12px; font-size: 13px; color: #aaa; }
.channel { margin-bottom: 4px; }
.channel-label {
    display: inline-block; width: 50px;
    font-size: 13px; color: #aaa; vertical-align: top; padding-top: 4px;
}
canvas { display: inline-block; background: #1a1a1a; border-radius: 3px; }
#controls { padding: 12px 0; }
#controls label { font-size: 13px; color: #888; margin-right: 16px; }
#controls select, #controls input { background: #222; color: #eee; border: 1px solid #444; padding: 2px 6px; font-family: monospace; }
</style>
</head>
<body>
<div id="status">Connecting...</div>
<div id="info"></div>
<div id="controls">
    <label>Window: <select id="window">
        <option value="2">2s</option>
        <option value="4" selected>4s</option>
        <option value="8">8s</option>
        <option value="16">16s</option>
    </select></label>
    <label>Scale: <input id="scale" type="range" min="10" max="500" value="100"> <span id="scaleVal">100</span> uV</label>
</div>
<div id="channels"></div>

<script>
const COLORS = ['#4fc3f7', '#aed581', '#ffb74d', '#f06292', '#ce93d8', '#80cbc4', '#fff176', '#e57373'];
const CANVAS_H = 100;

let channels = [];
let samplingRate = 256;
let windowSec = 4;
let scale = 100;
let buffers = {};
let canvases = {};

const statusEl = document.getElementById('status');
const infoEl = document.getElementById('info');
const channelsEl = document.getElementById('channels');

document.getElementById('window').onchange = function() {
    windowSec = parseInt(this.value);
    Object.keys(buffers).forEach(ch => {
        const maxLen = samplingRate * windowSec;
        if (buffers[ch].length > maxLen) buffers[ch] = buffers[ch].slice(-maxLen);
    });
    resizeCanvases();
};

document.getElementById('scale').oninput = function() {
    scale = parseInt(this.value);
    document.getElementById('scaleVal').textContent = scale;
};

function resizeCanvases() {
    const w = Math.min(window.innerWidth - 80, 1200);
    Object.values(canvases).forEach(c => { c.width = w; });
}

function initChannels(names) {
    channels = names;
    channelsEl.innerHTML = '';
    buffers = {};
    canvases = {};
    const w = Math.min(window.innerWidth - 80, 1200);

    names.forEach((name, i) => {
        buffers[name] = [];
        const div = document.createElement('div');
        div.className = 'channel';
        const label = document.createElement('span');
        label.className = 'channel-label';
        label.textContent = name;
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = CANVAS_H;
        canvases[name] = canvas;
        div.appendChild(label);
        div.appendChild(canvas);
        channelsEl.appendChild(div);
    });
}

function drawChannel(name, colorIdx) {
    const canvas = canvases[name];
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    const buf = buffers[name];
    const maxLen = samplingRate * windowSec;

    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, w, h);

    // Center line
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, h / 2);
    ctx.lineTo(w, h / 2);
    ctx.stroke();

    if (buf.length < 2) return;

    ctx.strokeStyle = COLORS[colorIdx % COLORS.length];
    ctx.lineWidth = 1.5;
    ctx.beginPath();

    const len = Math.min(buf.length, maxLen);
    const start = buf.length - len;
    for (let i = 0; i < len; i++) {
        const x = (i / (maxLen - 1)) * w;
        const y = h / 2 - (buf[start + i] / scale) * (h / 2);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
}

function draw() {
    channels.forEach((name, i) => drawChannel(name, i));
    requestAnimationFrame(draw);
}

function connect() {
    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'info') {
            samplingRate = msg.samplingRate;
            infoEl.textContent = `${msg.board} | ${samplingRate} Hz | ${msg.channels.join(', ')}`;
            initChannels(msg.channels);
            requestAnimationFrame(draw);
            return;
        }

        if (msg.type === 'eeg') {
            const maxLen = samplingRate * windowSec;
            Object.keys(msg.data).forEach(ch => {
                if (!buffers[ch]) buffers[ch] = [];
                buffers[ch].push(...msg.data[ch]);
                if (buffers[ch].length > maxLen) {
                    buffers[ch] = buffers[ch].slice(-maxLen);
                }
            });
        }
    };

    ws.onclose = () => {
        statusEl.textContent = 'Disconnected - reconnecting...';
        statusEl.className = '';
        setTimeout(connect, 2000);
    };
}

window.addEventListener('resize', resizeCanvases);
connect();
</script>
</body>
</html>
