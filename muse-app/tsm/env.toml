[service]
name = "muse-app"
command = "node index.js"
description = "Muse EEG data acquisition via BrainFlow"

[shared]
PORT = "3030"
NODE_ENV = "production"
# Set to SYNTHETIC_BOARD to skip Muse hardware, or MUSE_2_BOARD to try real device (falls back to synthetic)
MUSE_BOARD = "MUSE_2_BOARD"
# 0 = run indefinitely as server
MUSE_SAMPLE_DURATION = "0"
MUSE_POLL_INTERVAL = "1000"

[local]
TSM_NAME = "muse-app"
NODE_ENV = "development"
MUSE_APP_SRC = "$HOME/src/muse-app"
cwd = "$HOME/src/muse-app"
