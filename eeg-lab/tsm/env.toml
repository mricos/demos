[service]
name = "eeg-lab"
command = "node index.js"
description = "EEG Lab — Muse 2 / TGAM / Synthetic data acquisition"

[shared]
PORT = "3030"
NODE_ENV = "production"
# Profile: muse2 | tgam (falls back to synthetic if no hardware)
EEG_PROFILE = "muse2"
# 0 = run indefinitely as server
EEG_SAMPLE_DURATION = "0"
EEG_POLL_INTERVAL = "100"
# TGAM serial port (e.g. /dev/tty.MindWaveMobile)
EEG_SERIAL_PORT = ""
# Relay URL: publish data to a relay hub (e.g. ws://relay-host:3040)
EEG_RELAY_URL = ""

[local]
TSM_NAME = "eeg-lab"
NODE_ENV = "development"
cwd = "$HOME/src/mricos/demos/eeg-lab"
