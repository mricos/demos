<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Lab — Neural Nets & Bayesian Stats</title>
<style>
  :root {
    --bg: #0a0b14;
    --surface: #12132a;
    --border: rgba(80,90,180,0.2);
    --accent: #4af0c0;
    --accent2: #ff7c45;
    --accent3: #a78bfa;
    --text: #dde0f5;
    --muted: #6b6e94;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  header {
    padding: 3rem 2rem 1.5rem;
    max-width: 900px;
    margin: 0 auto;
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  header p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 0.4rem;
  }
  .path {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 2rem;
  }
  .section {
    margin-bottom: 2.5rem;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section-num {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--bg);
    background: var(--accent);
    width: 1.6rem;
    height: 1.6rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .section-num.nn { background: var(--accent2); }
  .section-title {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text);
  }
  .section-sub {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: auto;
  }
  .cards {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.75rem;
  }
  a.card {
    display: grid;
    grid-template-columns: 5.5rem 1fr auto;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
  }
  a.card:hover {
    border-color: var(--accent);
    background: #181a36;
  }
  .card-id {
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 500;
  }
  .card-body h3 {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 0.15rem;
  }
  .card-body p {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.4;
  }
  .card-arrow {
    color: var(--muted);
    font-size: 1.2rem;
    transition: color 0.2s;
  }
  a.card:hover .card-arrow, a.card:focus .card-arrow { color: var(--accent); }
  a.card:focus { border-color: var(--accent); background: #181a36; outline: none; }
  .tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    background: rgba(74,240,192,0.1);
    color: var(--accent);
    margin-right: 0.3rem;
    vertical-align: middle;
  }
  .tag.nn {
    background: rgba(255,124,69,0.1);
    color: var(--accent2);
  }
  .tag.data {
    background: rgba(167,139,250,0.1);
    color: var(--accent3);
  }
  .connector {
    width: 2px;
    height: 1.5rem;
    background: var(--border);
    margin: 0 auto;
  }
  footer {
    max-width: 900px;
    margin: 2rem auto 3rem;
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
  }
  .loading {
    text-align: center;
    color: var(--muted);
    padding: 3rem;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<header>
  <h1>Learning Lab</h1>
  <p id="subtitle">Loading demos...</p>
</header>

<div class="path" id="path">
  <div class="loading">Scanning for meta.json files...</div>
</div>

<footer id="footer"></footer>

<script>
"use strict";

const SECTIONS = {
  0: { title: "All Demos", sub: "add a meta.json to categorize" },
  1: { title: "Probability Foundations", sub: "distributions, transforms, data" },
  2: { title: "Bayesian Inference", sub: "priors, posteriors, regularization" },
  3: { title: "Sequential & Time-Varying Models", sub: "dynamics, adaptation, model selection" },
  4: { title: "Classical Neural Networks", sub: "backprop, weight dynamics, signal processing", nn: true },
  5: { title: "Spiking & Attractor Networks", sub: "biological plausibility, dynamics, emergence", nn: true }
};

// Tags that get the "nn" style
const NN_TAGS = new Set(["neural-net","spiking","attractor","ML","invertible","WebGL","LIF"]);
const DATA_TAGS = new Set(["data"]);

// All known project directories — auto-discovered have meta.json,
// others are listed so they appear even without meta.json.
// To add a new demo, just create a meta.json in its directory.
const ALL_DIRS = [
  "arima","arrowbox","bayes","biview","bonds","boxcox","calabi-yau","cann",
  "cell","charfun","circles","cluster-synth","cymatica","diffeq-synth",
  "diffusion","dihedral","dunk","electape","esto","explainer","fftnn",
  "fingertips","gaussian","gmdh","graph-life","hilbert","hotclip","iris",
  "joystick","l-systems","mindwave","modulo","optigrab","phasefield",
  "phasefield-gpu","phm","phonovox","plan8","poincare","pong64","preskill",
  "pressure","quadrascan","raia","raybar","revclass","riemann","shipibo-ca",
  "sir","snn","snn2","speak","stablediffusion","stat-rethink","stringtoy",
  "svt","synthetic-iris","time-series","trackpad","tscale","tubes","twistor",
  "unitcircle","voder","vst"
];

function tagClass(t) {
  if (NN_TAGS.has(t)) return "tag nn";
  if (DATA_TAGS.has(t)) return "tag data";
  return "tag";
}

function renderCard(dir, meta) {
  const href = dir + "/" + meta.entry;
  const tags = (meta.tags || []).map(t =>
    '<span class="' + tagClass(t) + '">' + t + '</span>'
  ).join("");
  return '<a class="card" href="' + href + '">' +
    '<span class="card-id">' + dir + '</span>' +
    '<div class="card-body"><h3>' + meta.title + '</h3>' +
    '<p>' + (meta.description || "") + '</p>' + tags + '</div>' +
    '<span class="card-arrow">&rarr;</span></a>';
}

function renderSections(items) {
  const grouped = {};
  items.forEach(function(item) {
    var s = item.meta.section || 0;
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(item);
  });

  var html = "";
  var sectionNums = Object.keys(grouped).map(Number).sort();

  sectionNums.forEach(function(num, idx) {
    var sec = SECTIONS[num] || { title: "Other", sub: "" };
    if (idx > 0) html += '<div class="connector"></div>';
    html += '<div class="section">';
    html += '<div class="section-header">';
    html += '<span class="section-num' + (sec.nn ? " nn" : "") + '">' + num + '</span>';
    html += '<span class="section-title">' + sec.title + '</span>';
    html += '<span class="section-sub">' + sec.sub + '</span>';
    html += '</div><div class="cards">';
    grouped[num].forEach(function(item) {
      html += renderCard(item.dir, item.meta);
    });
    html += '</div></div>';
  });

  return html;
}

// Fetch all meta.json files — dirs with meta.json get full cards,
// dirs without get a minimal "undocumented" card in section 0.
Promise.all(ALL_DIRS.map(function(dir) {
  return fetch(dir + "/meta.json")
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(meta) {
      if (meta) return { dir: dir, meta: meta };
      // Fallback: show as undocumented demo
      return { dir: dir, meta: { title: dir, entry: "index.html", section: 0, tags: [], description: "" } };
    })
    .catch(function() {
      return { dir: dir, meta: { title: dir, entry: "index.html", section: 0, tags: [], description: "" } };
    });
})).then(function(results) {
  var items = results.filter(Boolean);
  var documented = items.filter(function(i) { return i.meta.section > 0; });
  document.getElementById("subtitle").textContent =
    items.length + " demos (" + documented.length + " documented) — probability foundations through spiking neural networks";
  document.getElementById("path").innerHTML = renderSections(items);
  document.getElementById("footer").innerHTML =
    items.length + " projects &middot; all vanilla JS &middot; no build step &middot; serve from any static server &middot; <kbd>j</kbd>/<kbd>k</kbd> to navigate, <kbd>Enter</kbd> to open";

  // Keyboard navigation
  var cards = document.querySelectorAll("a.card");
  var focusIdx = -1;

  function focusCard(idx) {
    if (idx < 0) idx = cards.length - 1;
    if (idx >= cards.length) idx = 0;
    focusIdx = idx;
    cards[focusIdx].focus();
    cards[focusIdx].scrollIntoView({ block: "nearest", behavior: "smooth" });
  }

  document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if (e.key === "j" || e.key === "ArrowDown") { e.preventDefault(); focusCard(focusIdx + 1); }
    else if (e.key === "k" || e.key === "ArrowUp") { e.preventDefault(); focusCard(focusIdx - 1); }
    else if (e.key === "Enter" && focusIdx >= 0) { cards[focusIdx].click(); }
  });
});
</script>

</body>
</html>
